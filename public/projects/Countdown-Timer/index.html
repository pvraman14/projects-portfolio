<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Catamaran:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="./dom.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main>
      <h1 class="header">Until New Beginnings</h1>
      <div class="countdown-timer">
        <div class="countdown-container days">
          <p class="big-text" id="days">0</p>
          <span class="countdown-container">days</span>
        </div>

        <div class="countdown-container hours">
          <p class="big-text" id="hours">0</p>
          <span class="countdown-container">hours</span>
        </div>

        <div class="countdown-container minutes">
          <p class="big-text" id="minutes">0</p>
          <span class="countdown-container">minutes</span>
        </div>

        <div class="countdown-container seconds">
          <p class="big-text" id="seconds">0</p>
          <span class="countdown-container">seconds</span>
        </div>
      </div>
    </main>
  </body>
</html>
